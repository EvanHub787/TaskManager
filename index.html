<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskManager</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=20260622-toast">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 7.5 10.5 4l6.5 3.5v8.8l-6.5 3.7L4 16.3Z"></path>
            <path d="M8 8.4h7.2M8 12h5.5M8 15.6h3.8"></path>
          </svg>
        </div>
        <div>
          <h1>TaskManager</h1>
          <p>CEMenu-T</p>
        </div>
      </div>

      <nav class="nav-tabs" aria-label="ビュー切替">
        <button class="nav-button active" data-view="dashboard" type="button">
          <span class="icon">◎</span>概要
        </button>
        <button class="nav-button" data-view="board" type="button">
          <span class="icon">▦</span>Issue
        </button>
        <button class="nav-button" data-view="todo" type="button">
          <span class="icon">□</span>Todo
        </button>
        <button class="nav-button" data-view="projects" type="button">
          <span class="icon">≡</span>案件
        </button>
        <button class="nav-button" data-view="people" type="button">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
              <circle cx="9.5" cy="7" r="4"></circle>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </span>メンバー
        </button>
      </nav>

      <div class="side-panel">
        <div class="side-label">今日の重点</div>
        <div id="todayFocus" class="focus-list"></div>
      </div>
    </aside>

    <main class="workspace">
      <div class="workspace-head">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">作業概要</h2>
          </div>
          <div class="actions">
            <div id="workflowTopSlot"></div>
            <details class="action-menu">
              <summary class="secondary-button">データ管理</summary>
              <div class="action-menu-content">
                <button id="openDataFileBtn" class="menu-item" type="button">
                  <span>開く</span>
                  <small>データファイルを開く</small>
                </button>
                <button id="saveDataFileBtn" class="menu-item" type="button">
                  <span>保存</span>
                  <small>データファイルへ保存</small>
                </button>
                <button id="exportBtn" class="menu-item" type="button">
                  <span>エクスポート</span>
                  <small>JSON を書き出す</small>
                </button>
                <label class="menu-item file-button">
                  <span>インポート</span>
                  <small>JSON から読み込む</small>
                  <input id="importFile" type="file" accept="application/json">
                </label>
                <div class="menu-separator"></div>
                <button id="dailyReportBtn" class="menu-item" type="button">
                  <span>日報を作成</span>
                  <small>今日の実績をテキストで出力</small>
                </button>
                <button id="historyBtn" class="menu-item" type="button">
                  <span>操作履歴</span>
                  <small>最近の変更と取り消し</small>
                </button>
                <button id="recoveryBtn" class="menu-item" type="button">
                  <span>復元ポイント</span>
                  <small>自動バックアップから復元</small>
                </button>
                <button id="shortcutHelpBtn" class="menu-item" type="button">
                  <span>ショートカット</span>
                  <small>キーボード操作を確認</small>
                </button>
                <div id="storageUsage" class="storage-usage">保存容量を確認中...</div>
              </div>
            </details>
            <button id="addTaskBtn" class="primary-button" type="button">
              <span>＋</span>新規
            </button>
          </div>
        </header>

        <section class="filters">
          <div class="search-box">
            <svg viewBox="0 0 24 24">
              <path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="タスク、案件、担当者、次のアクションを検索">
          </div>
          <div id="searchAssist" class="search-assist" hidden></div>
        </section>
      </div>

      <section id="dashboardView" class="view active"></section>
      <section id="boardView" class="view"></section>
      <section id="todoView" class="view"></section>
      <section id="projectsView" class="view"></section>
      <section id="peopleView" class="view"></section>
    </main>
  </div>

  <dialog id="taskDialog">
    <form id="taskForm" method="dialog">
      <div class="dialog-header">
        <h3 id="dialogTitle">新規タスク</h3>
        <button class="icon-button plain" value="cancel" type="button" id="closeDialog" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <path d="M6 6l12 12M18 6 6 18"></path>
          </svg>
        </button>
      </div>
      <input id="taskId" type="hidden">
      <label class="full-label title-label">タスク名<input id="taskTitle" required maxlength="80"></label>
      <label class="full-label">次のアクション<textarea id="taskNext" rows="3" required maxlength="220"></textarea></label>
      <label class="full-label">Issue URL / Issue 番号<input id="taskLink" inputmode="url" maxlength="300"
          placeholder="https://example.com/issues/123"></label>
      <input id="taskLinkedIssueId" type="hidden">
      <div class="form-grid task-meta-grid">
        <label>種別<select id="taskType" required></select></label>
        <label>案件<input id="taskProject" list="projectList" required maxlength="60"></label>
        <label>担当者<select id="taskOwner" required></select></label>
        <label>期限<input id="taskDue" type="date" required></label>
        <label>ステータス<select id="taskStatus" required></select></label>
        <label id="taskCompletedAtLabel" hidden>完了日<input id="taskCompletedAt" type="date"></label>
        <label>優先度<select id="taskPriority" required></select></label>
      </div>
      <label class="full-label">メモ<textarea id="taskNotes" rows="3" maxlength="300"></textarea></label>
      <div class="attachment-panel">
        <div class="attachment-toolbar">
          <label class="file-button attachment-add">画像追加
            <input id="taskImages" type="file" accept="image/*" multiple>
          </label>
          <span class="attachment-help">メモ欄へ画像を貼り付けても追加できます</span>
        </div>
        <div id="taskAttachmentList" class="attachment-list"></div>
      </div>
      <div class="dialog-actions">
        <button id="deleteTaskBtn" class="danger-button" type="button">削除</button>
        <button id="createTodoFromIssueBtn" class="secondary-button" type="button" hidden>Todoに追加</button>
        <span class="spacer"></span>
        <button class="ghost-button" type="button" id="cancelDialog">キャンセル</button>
        <button class="primary-button" value="default" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="imagePreviewDialog" class="image-preview-dialog">
    <div class="image-preview-shell">
      <button id="closeImagePreview" class="icon-button plain image-preview-close" type="button" aria-label="閉じる">
        <svg viewBox="0 0 24 24">
          <path d="M6 6l12 12M18 6 6 18"></path>
        </svg>
      </button>
      <img id="imagePreview" alt="">
      <p id="imagePreviewName"></p>
    </div>
  </dialog>

  <dialog id="utilityDialog" class="utility-dialog">
    <div class="utility-shell">
      <div class="dialog-header">
        <h3 id="utilityTitle"></h3>
        <button id="closeUtilityDialog" class="icon-button plain" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"></path></svg>
        </button>
      </div>
      <div id="utilityContent" class="utility-content"></div>
      <div id="utilityActions" class="dialog-actions"></div>
    </div>
  </dialog>

  <dialog id="endDayDialog" class="utility-dialog">
    <form id="endDayForm" class="utility-shell">
      <div class="dialog-header">
        <div><h3>Todo 日次整理</h3><p class="dialog-description">未完了 Todo の翌日の扱いをまとめて決めます。</p></div>
        <button id="closeEndDayDialog" class="icon-button plain" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"></path></svg>
        </button>
      </div>
      <div id="endDayList" class="end-day-list"></div>
      <div class="dialog-actions">
        <span class="spacer"></span>
        <button id="cancelEndDayDialog" class="ghost-button" type="button">キャンセル</button>
        <button class="primary-button" type="submit">反映</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden>
    <span id="toastMessage"></span>
    <button id="undoBtn" type="button" aria-label="取り消す" title="取り消す">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 14 4 9l5-5"></path>
        <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"></path>
      </svg>
    </button>
  </div>

  <datalist id="projectList"></datalist>
  <script src="app.js?v=20260620-productivity"></script>
</body>

</html>
